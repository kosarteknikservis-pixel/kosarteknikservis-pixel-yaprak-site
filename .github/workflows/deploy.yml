name: Canliya Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Hostinger VPS (SSH) deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: VPS'e rsync ile gonder
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude=.git --exclude=.github --exclude=xnull/controller/config.local.php --exclude=deploy.config.json --exclude=debug_integrity_log.txt --exclude=xnull/debug_integrity_log.txt --exclude=xnull/cloaker/blocked_ips.txt --exclude=js/ajax/libs/GeoLite2-City.mmdb --exclude=*.zip --exclude=GITHUB-KURULUM.md --exclude=scripts
          path: ./
          remote_path: ${{ secrets.SSH_REMOTE_DIR }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_port: ${{ secrets.SSH_PORT || 22 }}

      - name: Dosya izinlerini duzelt
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            REMOTE="${{ secrets.SSH_REMOTE_DIR }}"
            find "$REMOTE" -type d -exec chmod 755 {} \;
            find "$REMOTE" -type f -exec chmod 644 {} \;
            if [ -f "$REMOTE/.htaccess" ]; then chmod 644 "$REMOTE/.htaccess"; fi
